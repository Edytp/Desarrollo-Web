<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - INNOVAKIDS</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; margin:0; padding:0; }
        header { background-color: #0d6efd; color: white; padding: 20px; text-align: center; }
        header a { color: white; margin-left: 15px; text-decoration: none; font-weight: bold; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; background-color: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0d6efd; }
        form { display: flex; flex-direction: column; }
        input { margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        .btn { padding: 10px; background-color: #0d6efd; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background-color: #0b5ed7; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .alert.success { background-color: #198754; color: white; }
        .alert.danger { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>INNOVAKIDS</h1>
        <a href="{{ url_for('index') }}">Inicio</a>
        <a href="{{ url_for('login') }}">Ingresar</a>
    </header>

    <div class="container">
        <h2>Registro de Usuario</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="cedula" placeholder="Cédula" required>
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit" class="btn">Registrarse</button>
        </form>
    </div>
</body>
</html>
