{% extends "base.html" %}

{% block content %}

<h2>Editar Producto</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre" value="{{producto[1]}}"><br><br>

<label>Cantidad</label>
<input type="number" name="cantidad" value="{{producto[2]}}"><br><br>

<label>Precio</label>
<input type="number" step="0.01" name="precio" value="{{producto[3]}}"><br><br>

<button type="submit">Actualizar</button>

</form>

{% endblock %}
